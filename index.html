<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AHMAD BHAI QR GENERATOR</title>

<link rel="manifest" id="pwa-manifest">
<meta name="theme-color" content="#050a14">

<style>
  :root { --primary: #00f2fe; --usdt: #26a17b; --bg: #050a14; --glass: rgba(255, 255, 255, 0.05); }
  * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
  
  body { 
    background: var(--bg); color: white; min-height: 100vh; 
    display: flex; justify-content: center; align-items: center; padding: 20px; 
  }

  .container { 
    background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); 
    padding: 25px; border-radius: 25px; width: 100%; max-width: 440px; text-align: center; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  h1 { font-size: 1.5rem; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; font-weight: 800; letter-spacing: 1px; }

  /* Selection Grid with Full Names */
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
  .grid-item { 
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); 
    padding: 12px 5px; border-radius: 12px; cursor: pointer; font-size: 11px; 
    font-weight: bold; transition: 0.3s; text-transform: uppercase;
  }
  .grid-item.active { background: var(--primary); color: #000; border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }

  #usdt-options { display: none; justify-content: center; gap: 10px; margin-bottom: 15px; }
  .sub-item { background: #1a2a2a; border: 1px solid var(--usdt); padding: 6px 15px; border-radius: 20px; font-size: 11px; cursor: pointer; color: var(--usdt); font-weight: bold; }
  .sub-item.active { background: var(--usdt); color: white; }

  /* Input with Shake Effect */
  input { 
    width: 100%; padding: 15px; background: rgba(0,0,0,0.4); 
    border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; 
    color: white; outline: none; margin-bottom: 10px; transition: 0.3s;
  }
  input:focus { border-color: var(--primary); }
  input.error { border-color: #ff4b2b; box-shadow: 0 0 10px rgba(255, 75, 43, 0.3); }

  .shake { animation: shakeAnim 0.4s ease-in-out; }
  @keyframes shakeAnim {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-10px); }
    40%, 80% { transform: translateX(10px); }
  }

  /* QR Frame */
  #qrWrapper {
    background: white; padding: 20px; border-radius: 15px; margin: 0 auto 20px; 
    width: 220px; height: 220px; display: none; justify-content: center; align-items: center;
    box-shadow: 0 0 30px rgba(255,255,255,0.1);
  }

  button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; font-size: 14px; }
  #genBtn { background: linear-gradient(45deg, #4facfe, #00f2fe); color: #000; margin-bottom: 10px; }
  #downBtn { background: #fff; color: #000; display: none; }
  #installBtn { background: rgba(255,255,255,0.1); color: #fff; margin-top: 15px; display: none; border: 1px dashed var(--primary); }
</style>
</head>
<body>

<div class="container">
  <h1>AHMAD BHAI QR PRO</h1>

  <div class="grid">
    <div class="grid-item active" data-type="url">WEBSITE LINK</div>
    <div class="grid-item" data-type="whatsapp">WHATSAPP</div>
    <div class="grid-item" data-type="telegram">TELEGRAM</div>
    <div class="grid-item" data-type="usdt">USDT WALLET</div>
    <div class="grid-item" data-type="tiktok">TIKTOK</div>
    <div class="grid-item" data-type="insta">INSTAGRAM</div>
    <div class="grid-item" data-type="fb">FACEBOOK</div>
    <div class="grid-item" data-type="wifi">WIFI QR</div>
  </div>

  <div id="usdt-options">
    <div class="sub-item active" data-net="BEP20">BEP20 (BSC)</div>
    <div class="sub-item" data-net="TRC20">TRC20 (TRON)</div>
  </div>

  <div id="inputGroup">
    <div id="standard-field"><input type="text" id="userInput" placeholder="Paste link here..."></div>
    <div id="wifi-fields" style="display:none">
      <input type="text" id="wifiSSID" placeholder="WiFi Name (SSID)">
      <input type="text" id="wifiPass" placeholder="WiFi Password">
    </div>
  </div>

  <div id="qrWrapper"><div id="qrcode"></div></div>

  <button id="genBtn">GENERATE QR CODE</button>
  <button id="downBtn">DOWNLOAD QR IMAGE</button>
  <button id="installBtn">ADD TO HOME SCREEN</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
  // PWA Manifest Data
  const manifest = {
    "name": "Ahmad Bhai QR Generator",
    "short_name": "Ahmad Bhai QR Generator",
    "start_url": ".",
    "display": "standalone",
    "background_color": "#050a14",
    "theme_color": "#050a14",
    "icons": [{ "src": "icon.png", "sizes": "512x512", "type": "image/png" }]
  };
  document.getElementById('pwa-manifest').setAttribute('href', 'data:application/json;base64,' + btoa(JSON.stringify(manifest)));

  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBtn').style.display = 'flex';
  });

  const items = document.querySelectorAll('.grid-item');
  const inputGroup = document.getElementById('inputGroup');
  const userInput = document.getElementById('userInput');
  const qrWrapper = document.getElementById('qrWrapper');
  const qrDiv = document.getElementById('qrcode');
  const downBtn = document.getElementById('downBtn');
  let currentType = 'url';
  let currentNet = 'BEP20';

  // Selection Logic
  items.forEach(item => {
    item.addEventListener('click', () => {
      items.forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      currentType = item.dataset.type;
      
      document.getElementById('usdt-options').style.display = (currentType === 'usdt') ? 'flex' : 'none';
      document.getElementById('wifi-fields').style.display = (currentType === 'wifi') ? 'block' : 'none';
      document.getElementById('standard-field').style.display = (currentType === 'wifi') ? 'none' : 'block';
      
      qrWrapper.style.display = "none";
      downBtn.style.display = "none";
      userInput.classList.remove('error', 'shake');
      
      const hints = {
        url: 'Enter Website URL...',
        whatsapp: 'Number without + (e.g. 923...)',
        telegram: 'Username without @',
        usdt: 'Paste USDT Wallet Address...',
        tiktok: 'Tiktok Username...',
        insta: 'Instagram Username...',
        fb: 'Facebook Username...'
      };
      userInput.placeholder = hints[currentType] || "";
    });
  });

  document.querySelectorAll('.sub-item').forEach(s => {
    s.addEventListener('click', () => {
      document.querySelectorAll('.sub-item').forEach(i => i.classList.remove('active'));
      s.classList.add('active');
      currentNet = s.dataset.net;
    });
  });

  // Generate with Vibration and Shake
  document.getElementById('genBtn').addEventListener('click', () => {
    let finalData = "";
    let error = false;

    if(currentType === 'wifi') {
      const s = document.getElementById('wifiSSID');
      const p = document.getElementById('wifiPass');
      if(!s.value || !p.value) {
        s.classList.add('error', 'shake');
        p.classList.add('error', 'shake');
        error = true;
      } else {
        finalData = `WIFI:S:${s.value};T:WPA;P:${p.value};;`;
      }
    } else {
      let v = userInput.value.trim();
      if(!v) {
        userInput.classList.add('error', 'shake');
        error = true;
      } else {
        if(currentType === 'whatsapp') finalData = `https://wa.me/${v}`;
        else if(currentType === 'telegram') finalData = `https://t.me/${v}`;
        else if(currentType === 'usdt') finalData = `${currentNet} Address: ${v}`;
        else if(currentType === 'tiktok') finalData = `https://www.tiktok.com/@${v}`;
        else if(currentType === 'insta') finalData = `https://www.instagram.com/${v}`;
        else if(currentType === 'fb') finalData = `https://www.facebook.com/${v}`;
        else finalData = v;
      }
    }

    if(error) {
      if (navigator.vibrate) navigator.vibrate(200); // Vibrate on error
      setTimeout(() => {
        userInput.classList.remove('shake');
        document.getElementById('wifiSSID').classList.remove('shake');
        document.getElementById('wifiPass').classList.remove('shake');
      }, 400);
      return;
    }

    userInput.classList.remove('error');
    qrDiv.innerHTML = "";
    qrWrapper.style.display = "flex";
    new QRCode(qrDiv, { text: finalData, width: 180, height: 180, correctLevel: QRCode.CorrectLevel.H });
    
    setTimeout(() => { downBtn.style.display = "flex"; }, 300);
  });

  // Professional Download using html2canvas
  downBtn.addEventListener('click', () => {
    html2canvas(qrWrapper, {
      scale: 3,
      backgroundColor: "#ffffff",
      useCORS: true
    }).then(canvas => {
      const link = document.createElement('a');
      link.download = `AHMAD_QR_${Date.now()}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    });
  });
</script>
</body>
</html>
